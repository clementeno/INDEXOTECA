<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Referencioteca · Solicitudes</title>
  <style>
    :root {
      --bg: #0a0b11;
      --panel: #11131b;
      --panel-2: #171a24;
      --line: #2a2f42;
      --text: #eef1ff;
      --dim: #9ea5be;
      --ok: #35d07f;
      --warn: #ffd166;
      --chip: #1f2331;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font: 14px/1.45 -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, sans-serif;
    }
    .wrap {
      max-width: 1200px;
      margin: 0 auto;
      padding: 24px;
    }
    h1 { margin: 0 0 6px 0; font-size: 28px; }
    .sub { color: var(--dim); margin-bottom: 16px; }
    .toolbar {
      display: grid;
      grid-template-columns: 1fr auto auto auto;
      gap: 10px;
      margin-bottom: 14px;
    }
    .input, .select, .btn {
      border: 1px solid var(--line);
      background: var(--panel);
      color: var(--text);
      border-radius: 10px;
      min-height: 40px;
      padding: 0 12px;
    }
    .btn { cursor: pointer; }
    .btn:hover { background: var(--panel-2); }
    .stats {
      margin: 10px 0 12px;
      color: var(--dim);
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }
    .stats b { color: var(--text); }
    .table {
      border: 1px solid var(--line);
      border-radius: 12px;
      overflow: hidden;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      table-layout: fixed;
      background: var(--panel);
    }
    th, td {
      border-bottom: 1px solid var(--line);
      padding: 10px;
      text-align: left;
      vertical-align: top;
      word-wrap: break-word;
    }
    th { color: var(--dim); font-weight: 600; }
    tr:last-child td { border-bottom: 0; }
    .chip {
      display: inline-block;
      padding: 3px 8px;
      border-radius: 999px;
      background: var(--chip);
      border: 1px solid var(--line);
      font-size: 12px;
    }
    .message {
      max-height: 150px;
      overflow: auto;
      white-space: pre-wrap;
    }
    .small { color: var(--dim); font-size: 12px; }
    .row-actions { display: flex; gap: 8px; flex-wrap: wrap; }
    .row-btn {
      border: 1px solid var(--line);
      background: transparent;
      color: var(--text);
      border-radius: 8px;
      padding: 4px 8px;
      cursor: pointer;
      font-size: 12px;
    }
    .row-btn:hover { background: var(--panel-2); }
    .row-btn.resolve { border-color: #2f6f4f; color: var(--ok); }
    .row-btn.delete { border-color: #73403f; color: #ff9f9f; }
    .status-open { color: var(--warn); }
    .status-resolved { color: var(--ok); }
    @media (max-width: 920px) {
      .toolbar { grid-template-columns: 1fr 1fr; }
      table, thead, tbody, th, td, tr { display: block; }
      thead { display: none; }
      tr { border-bottom: 1px solid var(--line); }
      td { border: 0; padding: 8px 10px; }
      td::before {
        content: attr(data-label);
        display: block;
        color: var(--dim);
        font-size: 12px;
        margin-bottom: 4px;
      }
    }
  </style>
</head>
<body>
  <main class="wrap">
    <h1>Solicitudes de Referencioteca</h1>
    <div class="sub">Panel local para revisar modificaciones, bajas y enlaces con error.</div>

    <div class="toolbar">
      <input id="q" class="input" placeholder="Buscar por proyecto, autor o texto" />
      <select id="type" class="select">
        <option value="all">Todos los tipos</option>
        <option value="modify">Modificar información</option>
        <option value="remove">Solicitud de baja</option>
        <option value="link">Notificar enlace</option>
      </select>
      <button id="exportCsv" class="btn">Exportar CSV</button>
      <button id="clearAll" class="btn">Vaciar</button>
    </div>

    <div class="stats" id="stats"></div>

    <section class="table">
      <table>
        <thead>
          <tr>
            <th>Fecha</th>
            <th>Tipo</th>
            <th>Proyecto</th>
            <th>Detalle</th>
            <th>Estado</th>
            <th>Acciones</th>
          </tr>
        </thead>
        <tbody id="rows"></tbody>
      </table>
    </section>
  </main>

  <script>
    (function () {
      const STORAGE_KEY = 'ref2d_admin_requests_v1';
      const q = document.getElementById('q');
      const type = document.getElementById('type');
      const rows = document.getElementById('rows');
      const stats = document.getElementById('stats');
      const exportCsv = document.getElementById('exportCsv');
      const clearAll = document.getElementById('clearAll');

      const esc = (v) => String(v || '').replace(/[&<>"']/g, (c) => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));

      function load() {
        try {
          const raw = localStorage.getItem(STORAGE_KEY);
          const list = raw ? JSON.parse(raw) : [];
          return Array.isArray(list) ? list : [];
        } catch (_) {
          return [];
        }
      }

      function save(list) {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(list));
      }

      function fmtDate(iso) {
        const d = new Date(iso);
        if (Number.isNaN(d.getTime())) return '—';
        return d.toLocaleString('es-CL');
      }

      function filterList(list) {
        const text = (q.value || '').trim().toLowerCase();
        const t = type.value;
        return list.filter((it) => {
          if (t !== 'all' && it.type !== t) return false;
          if (!text) return true;
          const hay = [
            it.projectTitle,
            it.projectAuthor,
            it.message,
            it.requesterEmail,
            it.projectArea,
            it.projectYear,
            it.typeLabel
          ].join(' ').toLowerCase();
          return hay.includes(text);
        });
      }

      function render() {
        const all = load();
        const list = filterList(all);
        const openCount = all.filter((x) => x.status !== 'resolved').length;
        const resolvedCount = all.filter((x) => x.status === 'resolved').length;

        stats.innerHTML = '<span>Total: <b>' + all.length + '</b></span>' +
          '<span>Abiertas: <b>' + openCount + '</b></span>' +
          '<span>Resueltas: <b>' + resolvedCount + '</b></span>' +
          '<span>Mostrando: <b>' + list.length + '</b></span>';

        if (!list.length) {
          rows.innerHTML = '<tr><td colspan="6" class="small">Sin solicitudes.</td></tr>';
          return;
        }

        rows.innerHTML = list.map((it) => {
          const status = it.status === 'resolved' ? 'resuelta' : 'abierta';
          const link = it.projectUrl ? '<div class="small"><a href="' + esc(it.projectUrl) + '" target="_blank" rel="noopener">Abrir link</a></div>' : '<div class="small">Sin link</div>';
          const email = it.requesterEmail ? '<div class="small">Correo: ' + esc(it.requesterEmail) + '</div>' : '<div class="small">Correo: —</div>';

          return '<tr data-id="' + esc(it.id) + '">' +
            '<td data-label="Fecha">' + esc(fmtDate(it.createdAt)) + '</td>' +
            '<td data-label="Tipo"><span class="chip">' + esc(it.typeLabel || it.type || '—') + '</span></td>' +
            '<td data-label="Proyecto"><b>' + esc(it.projectTitle || '—') + '</b><div class="small">Autor: ' + esc(it.projectAuthor || '—') + '</div><div class="small">Área: ' + esc(it.projectArea || '—') + ' · Año: ' + esc(it.projectYear || '—') + '</div>' + link + '</td>' +
            '<td data-label="Detalle"><div class="message">' + esc(it.message || '') + '</div>' + email + '</td>' +
            '<td data-label="Estado"><span class="status-' + (it.status === 'resolved' ? 'resolved' : 'open') + '">' + status + '</span></td>' +
            '<td data-label="Acciones"><div class="row-actions"><button class="row-btn resolve" data-act="toggle">' + (it.status === 'resolved' ? 'Reabrir' : 'Resolver') + '</button><button class="row-btn delete" data-act="delete">Eliminar</button></div></td>' +
          '</tr>';
        }).join('');
      }

      rows.addEventListener('click', function (e) {
        const btn = e.target.closest('button[data-act]');
        if (!btn) return;
        const tr = e.target.closest('tr[data-id]');
        if (!tr) return;
        const id = tr.getAttribute('data-id');
        const list = load();
        const idx = list.findIndex((x) => String(x.id) === String(id));
        if (idx < 0) return;

        if (btn.dataset.act === 'toggle') {
          list[idx].status = list[idx].status === 'resolved' ? 'open' : 'resolved';
        } else if (btn.dataset.act === 'delete') {
          list.splice(idx, 1);
        }
        save(list);
        render();
      });

      exportCsv.addEventListener('click', function () {
        const list = filterList(load());
        const head = ['id','createdAt','type','typeLabel','projectTitle','projectAuthor','projectYear','projectArea','projectUrl','requesterEmail','message','status'];
        const rowsCsv = [head.join(',')];
        list.forEach((it) => {
          const vals = head.map((k) => {
            const v = String(it[k] || '').replace(/"/g, '""');
            return '"' + v + '"';
          });
          rowsCsv.push(vals.join(','));
        });
        const blob = new Blob([rowsCsv.join('\n')], { type: 'text/csv;charset=utf-8;' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'solicitudes-referencioteca.csv';
        document.body.appendChild(a);
        a.click();
        a.remove();
        URL.revokeObjectURL(url);
      });

      clearAll.addEventListener('click', function () {
        if (!window.confirm('¿Vaciar todas las solicitudes guardadas localmente?')) return;
        save([]);
        render();
      });

      q.addEventListener('input', render);
      type.addEventListener('change', render);
      render();
    })();
  </script>
</body>
</html>
